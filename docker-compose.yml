name: samakia-vector

services:
  qdrant-1:
    image: qdrant/qdrant:latest
    container_name: samakia-vector-1
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant-1:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__P2P__PORT: 6335
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - samakia-edge-net
      - vector-internal

  qdrant-2:
    image: qdrant/qdrant:latest
    container_name: samakia-vector-2
    restart: unless-stopped
    volumes:
      - ./data/qdrant-2:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__P2P__PORT: 6335
      QDRANT__CLUSTER__BOOTSTRAP: "http://qdrant-1:6335"
      QDRANT__SERVICE__GRPC_PORT: 6334
    depends_on:
      - qdrant-1
    networks:
      - vector-internal

  qdrant-3:
    image: qdrant/qdrant:latest
    container_name: samakia-vector-3
    restart: unless-stopped
    volumes:
      - ./data/qdrant-3:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__P2P__PORT: 6335
      QDRANT__CLUSTER__BOOTSTRAP: "http://qdrant-1:6335"
      QDRANT__SERVICE__GRPC_PORT: 6334
    depends_on:
      - qdrant-1
    networks:
      - vector-internal

networks:
  samakia-edge-net:
    external: true
  vector-internal:
    driver: bridge
